<section class="estrattore-page">
  <div class="toolbar">
    <div class="filters-grid">
      <app-input
        [label]="'Categoria'"
        [placeholder]="'Inserisci categoria'"
        [value]="selectedCategory"
        (valueChange)="selectedCategory = $event">
      </app-input>

      <menutendina
        [label]="'Azienda'"
        [placeholder]="'Seleziona azienda'"
        [options]="companies"
        [showAddNew]="false"
        [selected]="selectedCompany"
        (selectedChange)="onCompanyChange($event)">
      </menutendina>

      <app-input
        [label]="'Reparto'"
        [placeholder]="'Inserisci reparto'"
        [value]="selectedDepartment"
        (valueChange)="selectedDepartment = $event">
      </app-input>

      <app-input
        [label]="'Mese/Anno di Competenza'"
        [placeholder]="'Inserisci mese/anno (es. 03/2026)'"
        [value]="selectedCompetenceMonthYear"
        (valueChange)="selectedCompetenceMonthYear = $event">
      </app-input>
    </div>

    <div class="action-area">
      <app-button
        [label]="'Carica'"
        [icon]="'pi pi-upload'"
        [disabled]="!canUpload"
        (action)="upload()">
      </app-button>
    </div>
  </div>

  <div class="upload-area">
    <app-upload
      [accept]="'.pdf,.csv,.jpg'"
      [multiple]="true"
      [titleText]="'Carica uno o piu documenti'"
      [subtitleText]="'(pdf, csv, jpg)'"
      (filesSelected)="onFilesSelected($event)">
    </app-upload>
  </div>
</section>
