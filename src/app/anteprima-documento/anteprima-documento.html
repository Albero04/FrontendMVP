<div class="header"></div>
<div class="preview-layout d-flex flex-wrap gap-5">
    <div class="doc-summary-container">
        <bb-doc-summary [result]="result" (openOriginalPdf)="handleOpenOriginalPdf()" (openSplitPdf)="handleOpenSplitPdf()"></bb-doc-summary>
    </div>

    <div class="info-container">
        <div>
            <bb-extracted-employee-info
                [rows]="extractedEmployeeRows"
                (editRequested)="handleEditExtractedEmployeeInfo()"
                (rowRemoved)="handleRemoveExtractedEmployeeRow($event)"
            ></bb-extracted-employee-info>
            <div class="d-flex justify-content-end">

                <app-button label="Invia il documento" class="genera btn btn-primary" (action)="showDialog()"></app-button>
            </div>

        </div>

        <div>

        </div>
    </div>
</div>
<p-toast></p-toast>
