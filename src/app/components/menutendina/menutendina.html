<p-iftalabel class="w-full md:w-56">
  <p-select
    [options]="options"
    [(ngModel)]="selected"
    (ngModelChange)="selectedChange.emit($event)"
    optionLabel="name"
    [filter]="true"
    [placeholder]="placeholder"
    class="w-full md:w-56">

    <ng-template #header>
      <div class="HeaderMenu">{{ label }} Disponibili</div>
    </ng-template>
    <ng-template #footer>
        <div class="p-3">
            <p-button label="Add New" fluid severity="secondary" text size="small" icon="pi pi-plus" />
        </div>
    </ng-template>   
  </p-select>
  <label>{{ label }}</label>
</p-iftalabel>
