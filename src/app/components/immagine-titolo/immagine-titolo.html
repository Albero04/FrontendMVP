<div class="hero-banner">
  <p-image
    preview="true"
    [src]="imageUrl"
    [alt]="altText"
    class="hero-image"
  />
  <div class="hero-overlay">
    <input
      pInputText
      type="text"
      name="imageTitle"
      [ngModel]="_imageTitle"
      (ngModelChange)="onTitleChange($event)"
      placeholder="Titolo della generazione"
      class="hero-input"
      fluid
    />
  </div>
</div>
