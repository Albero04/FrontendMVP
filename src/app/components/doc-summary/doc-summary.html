<div class="bg-white my-4">
    <div class="card p-4">

        <!-- TOP ROW -->
        <div class="row mb-4">
            <div class="col-md-6">
                <bb-status-pill [state]="state"></bb-status-pill>
            </div>

            <div class="col-md-6">
                <label class="label">Confidenza media</label>
                <div class="confidence-pill bg-success text-white rounded-pill text-center py-2">
                    {{result?.confidence}}
                </div>
            </div>
        </div>

        <div class="row">

            <div class="col-md-5 mb-4">
                <div class="pdf-preview d-flex align-items-center justify-content-center">
                    <!-- qui probabilmente si fa un componente specifico, per ora lascio ocsì -->
                    <!-- <bb-pdf-viewer [src]="file"></bb-pdf-viewer> -->
                    <span class="text-muted">PDF Preview</span>
                </div>
            </div>

            <div class="col-md-7">

                <div class="mb-3">
                    <label class="label">Categoria</label>
                    <app-input [value]="result?.category ?? ''"></app-input>
                </div>

                <div class="mb-3">
                    <label class="label">Azienda</label>
                    <app-input [value]="result?.company ?? ''"></app-input>
                </div>

                <div class="mb-3">
                    <label class="label">Reparto</label>
                    <app-input [value]="result?.department ?? ''"></app-input>
                </div>

                <div class="mb-3">
                    <label class="label">Mese/Anno</label>
                    <app-input [value]="result?.month_year ?? ''"></app-input>
                </div>

            </div>
        </div>

        <div class="row mt-3">
            <div class="col-12 mb-3">
                <label class="label">Nome documento</label>
                <app-input [value]="result?.name ?? ''"></app-input>
            </div>

            <div class="col-md-4">
                <label class="label">Pagine estratte</label>
                <app-input></app-input>
            </div>
        </div>

    </div>
</div>
<div class="bg-white my-4 flex-1 d-flex align-items-center justify-content-between p-4">
    <app-button label="Apri documento originale" class="mx-2 btn-secondary" (action)="openOriginalPdf()"></app-button>
    <app-button label="Apri documento" class="mx-2 btn-primary" (action)="openSplitPdf()"></app-button>
</div>
