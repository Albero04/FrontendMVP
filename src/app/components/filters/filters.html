    
 @if (TypeOfFilter === 'dateRange') {
    <p-floatlabel variant="on">
        <div class="card flex justify-center">
            <p-datepicker 
            [(ngModel)]="dates"
            selectionMode="range"
            inputId="on_label"
            [readonlyInput]="true"
            showClear="true"
            (ngModelChange)="onDateSelect()"
            dateFormat="dd/mm/yy"/>
            <label for="on_label">{{ DatepickerLabel }}</label>
        </div>
    </p-floatlabel>
}
 @if(TypeOfFilter === 'text') {
    <p-floatlabel variant="on">
        <div class="card flex justify-center">
            <p-select
            showClear="true"
            inputId="text_label"
            [options]="textOptions"
            [(ngModel)]="selectedTextOption"
            (ngModelChange)="onTextOptionChange()"
            [filter]="true">
            </p-select>
            <label for="text_label">{{ TextFilterLabel }}</label>
        </div>
    </p-floatlabel>
 }
 @if(TypeOfFilter === 'searchbar'){
    <div class="card flex flex-wrap justify-center gap-4">
            <p-iconfield>
                <p-inputicon iconPosition="left" class="pi pi-search" />
                <input 
                pInputText 
                [(ngModel)]="searchvalue" 
                (ngModelChange)="onSearchChange()"  
                type="text" 
                placeholder="Cerca per tutto" />
            </p-iconfield>
    </div>
 }
