<div class="menu">
    <div class="actions">
        <app-button label="Rigenera" class="btn btn-secondary" [fluid]="true" (clicked)="onRigenera()"></app-button>
        <app-button label="Salva" class="btn btn-primary" [fluid]="true" (clicked)="onSalva()"></app-button>
    </div>

    <div class="discard p-2 bg-body rounded-4 ng-star-inserted">
        <div class="text-nowrap ng-star-inserted">
<app-dialog Icon="assets/icons/cross.svg" message="Vuoi cancellare questa generazione?" header="Attenzione" (confirmed)="deleteGeneration()">
</app-dialog>
        </div>
    </div>
</div>
<div class="body">
    <div class="image-container">
        <app-immagine-titolo [(imageTitle)]="imageTitle" [imageUrl]="imagePath"
            [altText]="imageAltText"></app-immagine-titolo>
    </div>
<div class="output-container">
    <app-editor [(text)]="testoGenerato" [readonly]="readonly"></app-editor>
</div>
    <div class="valutazione-modifica-container">
        <div class="valutazione">
            <app-valutazione></app-valutazione>
        </div>
        <div class="modifica">
            <app-button label="Modifica" severity="primary" [fluid]="true" (clicked)="onModifica()"></app-button>
        </div>
    </div>

    <!-- Sezione riepilogativa dei parametri scelti dall'utente nel Generatore -->
    <!-- Tutti i campi hanno [disabled]="true": non sono cliccabili né focalizzabili -->
    <div class="parametri-container">
        <label class="parametri-label">PARAMETRI INSERITI</label>
        <hr class="parametri-divider">
        <div class="parametri-fields">
            <!-- Prompt inserito dall'utente, in sola lettura -->
            <app-prompt [prompt]="promptInserito" label="Prompt" [autoResize]="true" [disabled]="true"></app-prompt>
            <!-- Tono selezionato, in sola lettura -->
            <!-- p-select richiede che il valore selezionato sia presente in [options] per poterlo visualizzare -->
            <app-menutendina [options]="tonoSelezionato ? [tonoSelezionato] : []" [selected]="tonoSelezionato"
                label="Tono" placeholder="Nessun tono selezionato" [disabled]="true"></app-menutendina>
            <!-- Stile selezionato, in sola lettura -->
            <app-menutendina [options]="stileSelezionato ? [stileSelezionato] : []" [selected]="stileSelezionato"
                label="Stile" placeholder="Nessuno stile selezionato" [disabled]="true"></app-menutendina>
        </div>
    </div>

</div>
