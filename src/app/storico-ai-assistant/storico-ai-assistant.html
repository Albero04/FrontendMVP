<div class="filters-menu">
<app-filters TypeOfFilter="searchbar" [(searchvalue)]="searchvalue" (searchvalueChange)="onSearchChange($event)"></app-filters>
<app-filters TypeOfFilter="dateRange" DatepickerLabel="Filtra Per Data" [(dates)]="dates" (datesChange)="onDateChange($event)"></app-filters>
<app-filters TypeOfFilter="text" TextFilterLabel="Tono" [textOptions]="tonoOptions" [(selectedTextOption)]="selectedTono" (selectedTextOptionChange)="onTonoChange($event)"></app-filters>
<app-filters TypeOfFilter="text" TextFilterLabel="Stile" [textOptions]="stileOptions" [(selectedTextOption)]="selectedStile" (selectedTextOptionChange)="onStileChange($event)"></app-filters>
<app-button [label]="ButtonLabel" (action)="NavigateToGeneratore()" ></app-button>
</div>
<app-tables
[Generazioni]="Generazioni"
[GenerazioniFiltrate]="GenerazioniFiltrate"
[tonoOptions]="tonoOptions"
[stileOptions]="stileOptions"
></app-tables>
