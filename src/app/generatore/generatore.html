<div class="generator-container">
<p-button class="genera" label="Genera" severity="primary"></p-button>
<div class="MenuToniStili">
    <p-iftalabel class="w-full md:w-56">
    <p-select [options]="tones" [(ngModel)]="selectedTone" optionLabel="name" [filter]="true" placeholder="Seleziona un tono" class="w-full md:w-56">
        <ng-template #header>
            <div class="HeaderMenu">Toni Disponibili</div>
        </ng-template>
        <ng-template #footer>
            <div class="p-3">
                <p-button label="Add New" fluid severity="secondary" text size="small" icon="pi pi-plus" />
            </div>
        </ng-template>   
    </p-select> 
    <label for="tones">Tono</label>
    </p-iftalabel>   

    <p-iftalabel class="w-full md:w-56">
    <p-select [options]="styles" [(ngModel)]="selectedStyle" optionLabel="name" [filter]="true" placeholder="Seleziona uno stile" class="w-full md:w-56">
        <ng-template #header>
            <div class="HeaderMenu">Stili Disponibili</div>
        </ng-template>
        <ng-template #footer>
            <div class="p-3">
                <p-button label="Add New" fluid severity="secondary" text size="small" icon="pi pi-plus" />
            </div>
        </ng-template>   
    </p-select>   
    <label for="styles">Stile</label>
    </p-iftalabel> 
</div>
<div class="body">
    <p-floatlabel variant="on">
        <input id="Prompt" pInputText [(ngModel)]="prompt" autocomplete="off" />
        <label for="Prompt">Prompt</label>
    </p-floatlabel>
</div>
</div>
