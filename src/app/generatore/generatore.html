<div class="generator-container">
<p-button class="genera" label="Genera" severity="primary"></p-button>
<div class="MenuToniStili">
    <app-menutendina [options]="tones" [(selected)]="selectedTone" label="Toni" placeholder="Seleziona un tono"></app-menutendina>
    <app-menutendina [options]="styles" [(selected)]="selectedStyle" label="Stili" placeholder="Seleziona uno stile"></app-menutendina>

</div>
<div class="body">
    <p-floatlabel variant="on">
        <input id="Prompt" pInputText [(ngModel)]="prompt" autocomplete="off" />
        <label for="Prompt">Prompt</label>
    </p-floatlabel>
</div>
</div>
