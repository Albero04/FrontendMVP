<div class="generator-container">
<p-button class="genera" label="Genera" severity="primary" (onClick)="NavigateToRisultatoGenerazione()"></p-button>
<div class="menu-row">
    <menutendina [options]="tones" [(selected)]="selectedTone" label="Toni" placeholder="Seleziona un tono"></menutendina>
    <menutendina [options]="styles" [(selected)]="selectedStyle" label="Stili" placeholder="Seleziona uno stile"></menutendina>

</div>
<div class="body">
    <app-prompt [(prompt)]="prompt" label="Prompt" [autoResize]="true"></app-prompt>
</div>
</div>
