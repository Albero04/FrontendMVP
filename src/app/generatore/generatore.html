<div class="generator-container">
    <div class="d-flex">
        <app-button label="Genera" class="ms-auto genera btn btn-primary" [fluid]="true" (action)="generate()"></app-button>
    </div>
    <div class="menu-row mb-4" >
        <menutendina [options]="(tones$ | async)" [(selected)]="selectedTone" label="Toni" placeholder="Seleziona un tono"></menutendina>
        <menutendina [options]="(styles$ | async)" [(selected)]="selectedStyle" label="Stili" placeholder="Seleziona uno stile"></menutendina>
    </div>

    <app-prompt [(prompt)]="prompt" label="Prompt" [autoResize]="true"></app-prompt>
    <app-button label="Apri dialog prova" class="genera btn btn-primary" [fluid]="true" (action)="showDialog()"></app-button>
</div>
<p-toast></p-toast>
